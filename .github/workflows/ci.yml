name: CI

# Verifies every push and pull request: formatting + that the gRPC stubs
# generate and compile from the shared .proto.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Generate & compile stubs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # sbt-dynver needs full history + tags
      - uses: ./.github/actions/setup-scala
      - name: Check formatting
        run: sbt -batch scalafmtCheckAll scalafmtSbtCheck
      - name: Compile & test
        run: sbt -batch compile test

  python:
    name: Python stubs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # hatch-vcs derives the version from tags
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install and test the Python client
        run: |
          python -m pip install --upgrade pip
          pip install ./python pytest
          python -m pytest python/tests -q
