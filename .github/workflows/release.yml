name: Release

# Publishes the versioned Scala artifact (generated Apollo gRPC stubs) to GitHub
# Packages when a semver tag vX.Y.Z is pushed. Consumers pin that version.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  packages: write # publish to GitHub Packages

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for sbt-dynver to derive the version from the tag
      - uses: ./.github/actions/setup-scala
      - name: Publish
        # The built-in GITHUB_TOKEN authorizes the Maven push (build.sbt reads it).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sbt -batch publish
