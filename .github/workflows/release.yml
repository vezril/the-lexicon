name: Release

# On a semver tag vX.Y.Z, publishes both artifacts at that version: the Scala jar
# to GitHub Packages, and the Python package (wheel + sdist) attached to the GitHub
# Release. One tag, one version, both languages. Consumers pin that version.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write # create the GitHub Release + upload the Python assets
  packages: write # publish the Scala jar to GitHub Packages

jobs:
  publish-scala:
    name: Publish Scala jar to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for sbt-dynver to derive the version from the tag
      - uses: ./.github/actions/setup-scala
      - name: Publish
        # The built-in GITHUB_TOKEN authorizes the Maven push (build.sbt reads it).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sbt -batch publish

  publish-python:
    name: Build & attach Python package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # hatch-vcs derives the version from the tag
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build python/
      - name: Attach to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: python/dist/*
